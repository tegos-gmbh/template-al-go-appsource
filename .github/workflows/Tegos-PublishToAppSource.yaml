name: 'Tegos - Publish To AppSource'
run-name: 'Tegos - Publish To AppSource (${{ github.event.release.tag_name }})'

# Event-driven: this workflow reacts to a GitHub Release being published.
#
# Why 'release' and not 'workflow_run' on 'Create release':
#   The 'Create release' workflow is dispatched (workflow_dispatch) by the
#   'Tegos - Release' workflow using the default GITHUB_TOKEN. GitHub suppresses
#   the cascading 'workflow_run: completed' event for any run that was triggered
#   by GITHUB_TOKEN, so a downstream 'workflow_run' trigger never fires.
#
#   However, AL-Go's CreateRelease creates the GitHub Release using
#   'TokenForPush' (the ghTokenWorkflow token, because we dispatch CreateRelease
#   with useGhTokenWorkflow=true). Events produced by a non-GITHUB_TOKEN DO
#   cascade, so the 'release' event fires reliably - we hook into that instead.
on:
  release:
    types: [ published ]

# Dispatching the PublishToAppSource workflow requires write access to actions.
permissions:
  actions: write
  contents: read

# Avoid overlapping publish dispatches for the same release tag.
concurrency:
  group: tegos-publishtoappsource-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  APPSOURCE_WORKFLOW: 'PublishToAppSource.yaml'

jobs:
  publish-to-appsource:
    name: Publish to AppSource
    # Only publish full releases - never drafts or pre-releases.
    if: ${{ github.event.release.draft == false && github.event.release.prerelease == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger PublishToAppSource
        uses: actions/github-script@v7
        env:
          # workflow_dispatch needs a branch/tag ref; the default branch is the
          # safe choice (the release commitish may be a bare SHA, which is not
          # a valid dispatch ref).
          TARGET_REF: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        with:
          script: |
            const workflowId = process.env.APPSOURCE_WORKFLOW;
            const ref = process.env.TARGET_REF;
            const tag = process.env.RELEASE_TAG;

            core.info(`Dispatching '${workflowId}' for release '${tag}' | appVersion='current' projects='*' GoLive=true ref='${ref}'`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref,
              inputs: {
                appVersion: 'current',
                projects: '*',
                GoLive: 'true',
              },
            });

            core.info(`'${workflowId}' dispatched successfully.`);
            await core.summary
              .addHeading('Publish to AppSource dispatched', 2)
              .addTable([
                [{ data: 'Property', header: true }, { data: 'Value', header: true }],
                ['Release tag', tag],
                ['Dispatch ref', ref],
                ['App version to deliver', 'current'],
                ['Projects to publish', '* (all)'],
                ['Promote AppSource app to go live', 'yes'],
              ])
              .write();
