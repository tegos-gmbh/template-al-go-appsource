name: 'Tegos - Publish To AppSource'
run-name: 'Tegos - Publish To AppSource (after Create release #${{ github.event.workflow_run.run_number }})'

# Event-driven: this workflow reacts to the standard CreateRelease workflow
# completing, so there is no polling and almost no extra Action minutes are
# consumed.
on:
  workflow_run:
    workflows: [ 'Create release' ]   # must match the workflow name as stored by GitHub (leading/trailing whitespace is trimmed)
    types: [ completed ]

# Dispatching the PublishToAppSource workflow requires write access to actions.
permissions:
  actions: write
  contents: read

# Avoid overlapping publish dispatches for the same source branch.
concurrency:
  group: tegos-publishtoappsource-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

env:
  APPSOURCE_WORKFLOW: 'PublishToAppSource.yaml'

jobs:
  publish-to-appsource:
    name: Publish to AppSource
    # Only continue when the CreateRelease workflow actually succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger PublishToAppSource
        uses: actions/github-script@v7
        env:
          TARGET_REF: ${{ github.event.workflow_run.head_branch }}
        with:
          script: |
            const workflowId = process.env.APPSOURCE_WORKFLOW;
            const ref = process.env.TARGET_REF;

            core.info(`Dispatching '${workflowId}' | appVersion='current' projects='*' GoLive=true ref='${ref}'`);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              ref,
              inputs: {
                appVersion: 'current',
                projects: '*',
                GoLive: 'true',
              },
            });

            core.info(`'${workflowId}' dispatched successfully.`);
            await core.summary
              .addHeading('Publish to AppSource dispatched', 2)
              .addTable([
                [{ data: 'Property', header: true }, { data: 'Value', header: true }],
                ['Source branch', ref],
                ['App version to deliver', 'current'],
                ['Projects to publish', '* (all)'],
                ['Promote AppSource app to go live', 'yes'],
              ])
              .write();
